# ════════════════════════════════════════════════════════════
# NECRODERMIS — CORTEX NODE  //  ~/.config/kitty/kitty.conf
# ════════════════════════════════════════════════════════════

# ── FONT ─────────────────────────────────────────────────────
font_family      family='Terminess Nerd Font Mono' postscript_name=TerminessNFM
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# ── BACKGROUND ───────────────────────────────────────────────
# Necron warrior skull — generated by necro-kitty-bg.py
# Run: python3 ~/.config/kitty/necro-kitty-bg.py to regenerate
background_image                ~/.config/kitty/necrodermis-bg.png
background_image_layout         scaled
background_image_linear         yes
background_tint                 0.92
background_tint_gaps            1
background_opacity              0.96
dynamic_background_opacity      yes

# ── THEME ────────────────────────────────────────────────────
include ./kitty-themes/sautekh.conf

# ── CURSOR ───────────────────────────────────────────────────
cursor_trail                    1
cursor_trail_decay              0.1 0.4
cursor_trail_start_threshold    2

# ── WINDOW ───────────────────────────────────────────────────
window_padding_width            6
confirm_os_window_close         0
linux_display_server            auto

# ── SCROLLBACK ───────────────────────────────────────────────
scrollback_lines                4000
wheel_scroll_min_lines          1

# ── BELL ─────────────────────────────────────────────────────
enable_audio_bell               no
visual_bell_duration            0.0
