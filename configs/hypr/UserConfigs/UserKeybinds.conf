# ---- NECRODERMIS — SAUTEKH DYNASTY ----
# UserKeybinds.conf
# Custom keybinds for the Necrodermis theme
# https://github.com/YOUR_GIT_HERE — replace with your repo when published

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# ---- UNBINDS — removing defaults that conflict ----
unbind = $mainMod, T
unbind = $mainMod, M
unbind = $mainMod CTRL, R
unbind = $mainMod CTRL SHIFT, R
unbind = $mainMod SHIFT, O
unbind = $mainMod SHIFT, A
unbind = $mainMod CTRL, B
unbind = $mainMod ALT, B

# ---- NECRODERMIS REMAPS ----

# Dropdown terminal (replaces ThemeChanger)
bindd = $mainMod, T, dropdown terminal, exec, $scriptsDir/Dropterminal.sh $term

# Reload Hyprland (replaces split ratio)
bindd = $mainMod, M, reload Hyprland, exec, hyprctl reload

# Btop system monitor
bindd = CTRL SHIFT, Escape, system monitor, exec, $term -e btop
