# ════════════════════════════════════════════════════════════
# NECRODERMIS
# Hyprland Keybinds  //  conf/keybinds.conf
# System defaults — override or extend in user/keybinds.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY — BIND TYPES
# ────────────────────────────────────────────────────────────
#   bind   = fires once on keypress. Use for most things.
#   binde  = fires repeatedly while held. Use for resize, volume, brightness.
#   bindl  = fires even when screen is locked. Use for media keys.
#   bindm  = mouse bind. Use for move/resize with mouse buttons.
#   bindr  = fires on key release instead of press.
#
# FORMAT:
#   bind = MODIFIER, KEY, DISPATCHER, PARAMS
#
#   MODIFIER examples:
#     $mainMod            = SUPER alone
#     $mainMod SHIFT      = SUPER + SHIFT
#     $mainMod CTRL       = SUPER + CTRL
#     $mainMod ALT        = SUPER + ALT
#     (empty)             = no modifier — just the bare key
#
#   KEY examples:
#     Return, Space, Tab, Escape, F1–F12
#     left, right, up, down
#     mouse:272 = left click, mouse:273 = right click, mouse:274 = middle
#     xf86AudioPlay, xf86MonBrightnessUp, etc. (media/fn keys)
#
#   DISPATCHER examples:
#     exec             = run a command
#     killactive       = close focused window
#     fullscreen       = 0 = real fullscreen, 1 = maximize (keeps bar)
#     togglefloating   = float/unfloat window
#     workspace        = switch to workspace N, or e+1/e-1 for relative
#     movetoworkspace  = move focused window to workspace
#     movefocus        = move focus: l r u d
#     movewindow       = move window: l r u d
#     resizeactive     = resize by pixels: X Y (negative = shrink)
#     pseudo           = toggle pseudotile (dwindle layout)
#     togglesplit      = swap master/stack split direction
#
# ════════════════════════════════════════════════════════════

$mainMod = SUPER
$scripts = $HOME/.config/hypr/scripts

# ── Applications ──────────────────────────────────────────────────────────────
bind = $mainMod,       Return, exec, kitty
bind = $mainMod,       E,      exec, thunar
bind = $mainMod,       T,      exec, bash $HOME/.config/hypr/scripts/Dropterminal.sh
bind = $mainMod,       B,      exec, brave --disable-gpu
bind = $mainMod,       D,      exec, pkill rofi || rofi -show drun
bind = $mainMod SHIFT, D,      exec, rofi -show run

# ── Window management ─────────────────────────────────────────────────────────
bind = $mainMod,       Q,      killactive
bind = $mainMod,       F,      fullscreen, 0          # true fullscreen
bind = $mainMod SHIFT, F,      fullscreen, 1          # maximize (bar stays)
bind = $mainMod,       V,      togglefloating
bind = $mainMod,       P,      pseudo                 # dwindle pseudotile
bind = $mainMod,       J,      togglesplit            # swap split direction

# ── Focus movement ────────────────────────────────────────────────────────────
# Arrow keys and vim-style HJKL both work
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, H,     movefocus, l
bind = $mainMod, L,     movefocus, r
bind = $mainMod, K,     movefocus, u
bind = $mainMod, J,     movefocus, d

# ── Window movement ───────────────────────────────────────────────────────────
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, H,     movewindow, l
bind = $mainMod SHIFT, L,     movewindow, r
bind = $mainMod SHIFT, K,     movewindow, u
bind = $mainMod SHIFT, J,     movewindow, d

# ── Resize ────────────────────────────────────────────────────────────────────
# binde fires repeatedly while held — good for resize
# Values are pixels: resizeactive, X Y  (negative = shrink)
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40
binde = $mainMod CTRL, H,     resizeactive, -40 0
binde = $mainMod CTRL, L,     resizeactive,  40 0
binde = $mainMod CTRL, K,     resizeactive,  0 -40
binde = $mainMod CTRL, J,     resizeactive,  0  40

# ── Workspaces ────────────────────────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ── Move window to workspace ──────────────────────────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Workspace scroll ──────────────────────────────────────────────────────────
# [ and ] to step through workspaces. Mouse scroll on empty desktop also works.
bind  = $mainMod,       bracketleft,  workspace, -1
bind  = $mainMod,       bracketright, workspace, +1
bind  = $mainMod SHIFT, bracketleft,  movetoworkspace, -1
bind  = $mainMod SHIFT, bracketright, movetoworkspace, +1
bind  = $mainMod,       mouse_down,   workspace, e-1
bind  = $mainMod,       mouse_up,     workspace, e+1

# SUPER+S to toggle open/close, SUPER+SHIFT+S to send focused window there.

# ── Mouse window ops ──────────────────────────────────────────────────────────
# Hold SUPER and drag with left/right mouse button to move or resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Session ───────────────────────────────────────────────────────────────────
bind = $mainMod SHIFT, Q, exit          # exit Hyprland entirely
bind = $mainMod,       M, exec, wlogout  # logout/power menu

# ── Screenshots ───────────────────────────────────────────────────────────────
# Saved to ~/Pictures/Screenshots/
bind = ,      Print, exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = CTRL,  Print, exec, grim -g "$(slurp)" - | wl-copy   # copy to clipboard instead

# ── Audio ─────────────────────────────────────────────────────────────────────
# binde = repeats while held (smooth volume ramp)
# bindl = works even on lockscreen
binde = , xf86AudioRaiseVolume, exec, pamixer -i 5
binde = , xf86AudioLowerVolume, exec, pamixer -d 5
bindl  = , xf86AudioMute,       exec, pamixer -t
bindl  = , xf86AudioPlay,       exec, playerctl play-pause
bindl  = , xf86AudioNext,       exec, playerctl next
bindl  = , xf86AudioPrev,       exec, playerctl previous

# ── Hyprland reload ───────────────────────────────────────────────────────────
# Reloads config without logging out — use this after editing any conf file
bind = $mainMod SHIFT, R, exec, hyprctl reload
