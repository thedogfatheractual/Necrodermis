# ════════════════════════════════════════════════════════════
# NECRODERMIS — SAUTEKH DYNASTY
# Hyprland Decorations  //  conf/decorations.conf
# System defaults — override in user/decorations.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# ROUNDING
#   rounding = corner radius in pixels. 0 = sharp corners. 8–12 = modern look.
#
# BLUR
#   enabled           = toggles blur entirely.
#   size              = blur radius. Higher = more blur. Heavy on GPU above 8.
#   passes            = how many blur iterations. More = smoother but heavier.
#                       2–3 is the sweet spot. Above 4 is diminishing returns.
#   new_optimizations = caches blur for static backgrounds. Keep true.
#   xray              = blur shows through transparent windows (like terminals).
#                       false = each window blurs independently.
#   ignore_opacity    = blurs even fully opaque windows. Usually leave false.
#
# OPACITY
#   active_opacity    = opacity of the focused window. 1.0 = fully opaque.
#   inactive_opacity  = opacity of unfocused windows. 0.9 = slight fade.
#   fullscreen_opacity = opacity when a window is fullscreen. Keep 1.0.
#   Note: per-app opacity is set in windowrules.conf and overrides these.
#
# SHADOW
#   enabled      = toggles drop shadows.
#   range        = shadow size in pixels.
#   render_power = sharpness of shadow falloff. 2–4 is natural.
#                  Higher = harder edge. Lower = softer spread.
#   color        = shadow colour in rgba(). Last value = opacity.
#
# BORDERS
#   border_size and col.active_border are set in settings.conf general {}.
#   Gradient borders: rgba(COLOR1) rgba(COLOR2) ANGLE deg
#   Animated gradient: set animation = borderangle in animations.conf
#   Wallust will override border colours dynamically when active.
#
# ════════════════════════════════════════════════════════════

decoration {
    rounding = 8

    blur {
        enabled           = true
        size              = 6
        passes            = 3
        new_optimizations = true
        xray              = false
        ignore_opacity    = false
    }

    active_opacity     = 1.0
    inactive_opacity   = 0.95
    fullscreen_opacity = 1.0

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(0,0,0,0.6)
    }
}

general {
    border_size = 3
    gaps_in     = 5
    gaps_out    = 10

    # Gradient border — animates when borderangle is set in animations.conf
    # Wallust overrides these colours dynamically — edit wallust config to change
    col.active_border   = rgba(00ff88ff) rgba(00cc66ff) 45deg
    col.inactive_border = rgba(1a1a1aaa)
}
