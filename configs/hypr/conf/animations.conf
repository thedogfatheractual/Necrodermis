# ════════════════════════════════════════════════════════════
# NECRODERMIS
# Hyprland Animations  //  conf/animations.conf
# System defaults — override in user/animations.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# BEZIER CURVES
#   Define the easing curve of an animation — how it accelerates/decelerates.
#   bezier = NAME, X1, Y1, X2, Y2
#   The four values are control points for a cubic bezier curve (0.0–1.0ish).
#   Use https://cubic-bezier.com to visualise and tune curves.
#
#   Common presets:
#     Linear:   0.0, 0.0, 1.0, 1.0  — constant speed, no easing
#     EaseOut:  0.0, 1.0, 0.5, 1.0  — fast start, slow end (snappy feel)
#     EaseIn:   0.5, 0.0, 1.0, 1.0  — slow start, fast end
#     Overshoot: values above 1.0 on Y create a bounce/spring effect
#
# ANIMATION FORMAT
#   animation = TARGET, ENABLED, SPEED, BEZIER, STYLE
#
#   TARGET:
#     windows      = window open/close
#     windowsOut   = window close specifically
#     windowsMove  = window being dragged or moved
#     border       = border colour transition
#     borderangle  = animated gradient rotation on border
#     fade         = window fade in
#     fadeOut      = window fade out
#     workspaces   = workspace switch
#
#   ENABLED: 1 = on, 0 = off
#
#   SPEED: duration in 100ms units. 3 = 300ms. Lower = faster.
#          Range: 1 (instant) to 10+ (slow/dramatic)
#
#   BEZIER: name of a bezier curve defined above
#
#   STYLE (optional):
#     slide    = slides in from edge
#     popin    = scales up from center. popin 80% = starts at 80% size
#     fade     = pure opacity transition
#     slidevert = slides vertically
#     loop     = for borderangle — keeps rotating forever
#
# ════════════════════════════════════════════════════════════

animations {
    enabled = true

    # ── Bezier curves ─────────────────────────────────────────────────────────
    bezier = snap,     0.05, 0.9,  0.1, 1.05   # snappy with slight overshoot
    bezier = linear,   0.0,  0.0,  1.0, 1.0    # constant — used for loops
    bezier = overshot, 0.13, 0.99, 0.29, 1.1   # springy workspace switch

    # ── Windows ───────────────────────────────────────────────────────────────
    animation = windows,     1, 3, snap,   slide     # open: slide in, 300ms
    animation = windowsOut,  1, 2, linear, popin 80% # close: pop out, 200ms
    animation = windowsMove, 1, 2, snap              # drag: snappy reposition

    # ── Borders ───────────────────────────────────────────────────────────────
    animation = border,      1, 4, linear            # colour transition
    animation = borderangle, 1, 8, linear, loop      # gradient chase — loops forever

    # ── Fade ──────────────────────────────────────────────────────────────────
    animation = fade,    1, 3, linear
    animation = fadeOut, 1, 2, linear

    # ── Workspaces ────────────────────────────────────────────────────────────
    animation = workspaces, 1, 3, overshot, slide    # springy slide between ws
}
