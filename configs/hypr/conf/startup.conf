# ════════════════════════════════════════════════════════════
# NECRODERMIS — SAUTEKH DYNASTY
# Hyprland Startup  //  conf/startup.conf
# System defaults — override or extend in user/startup.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# exec-once = runs a command once when Hyprland starts.
#             Use for daemons, bars, background services.
#             Does NOT restart if the process crashes.
#
# exec      = runs every time Hyprland reloads (hyprctl reload).
#             Use for things that need to re-apply on config change,
#             like wallpaper or theme scripts.
#
# ORDER MATTERS:
#   Wayland environment must be set before anything that depends on it.
#   Polkit must start before any app that needs privilege escalation.
#   swww-daemon before any wallpaper set command.
#   waybar/swaync can start in any order after the environment is ready.
#
# WHAT EACH SERVICE DOES:
#   dbus-update-activation-environment  = tells D-Bus about the Wayland session.
#                                         Required for screen sharing, portals.
#   systemctl --user import-environment = same but for systemd user units.
#   hyprpolkitagent  = polkit agent — handles "enter password to continue" dialogs.
#   swww-daemon      = wallpaper daemon. Must run before setting a wallpaper.
#   waybar           = status bar.
#   swaync           = notification daemon (SwayNotificationCenter).
#   hypridle         = idle/lock daemon — triggers hyprlock on inactivity.
#   nm-applet        = NetworkManager tray icon.
#   blueman-applet   = Bluetooth tray icon.
#   cliphist         = clipboard history daemon. Stores text and image clips.
#                      Access history via rofi: rofi -modi clipboard:cliphist-rofi
#
# TO ADD YOUR OWN:
#   exec-once = /path/to/your/script.sh
#   exec-once = appname --flag
#
# ════════════════════════════════════════════════════════════

$scripts = $HOME/.config/hypr/scripts
$wallDIR = $HOME/Pictures/wallpapers/necrodermis

# ── Wayland environment — must be first ───────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Polkit — privilege escalation dialogs ─────────────────────────────────────
exec-once = hyprpolkitagent

# ── Wallpaper daemon ──────────────────────────────────────────────────────────
exec-once = swww-daemon --format xrgb
# To set a wallpaper after daemon starts, add:
# exec-once = swww img $wallDIR/your-wallpaper.png

# ── Bar + notifications ───────────────────────────────────────────────────────
exec-once = waybar
exec-once = swaync

# ── Idle / lock ───────────────────────────────────────────────────────────────
exec-once = hypridle

# ── Network tray ──────────────────────────────────────────────────────────────
exec-once = nm-applet --indicator

# ── Bluetooth tray ────────────────────────────────────────────────────────────
exec-once = blueman-applet

# ── Clipboard history ─────────────────────────────────────────────────────────
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
