# ════════════════════════════════════════════════════════════
# NECRODERMIS
# Hyprland Laptop Config  //  conf/laptops.conf
# Generic + Apple + ThinkPad binds
# Override or extend in user/laptops.conf
# ════════════════════════════════════════════════════════════

$mainMod = SUPER
$scripts  = $HOME/.config/hypr/scripts

# ── Generic — monitor brightness ─────────────────────────────────────────────
binde = , xf86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , xf86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Generic — keyboard backlight ─────────────────────────────────────────────
binde = , xf86KbdBrightnessUp,   exec, brightnessctl -d *::kbd_backlight set 10%+
binde = , xf86KbdBrightnessDown, exec, brightnessctl -d *::kbd_backlight set 10%-

# ── Generic — touchpad toggle ─────────────────────────────────────────────────
bind = , xf86TouchpadToggle, exec, $scripts/touchpad-toggle.sh

# ── Generic — screenshots (for laptops without Print key) ────────────────────
bind = $mainMod,       F6,       exec, grim ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod SHIFT, F6,       exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = CTRL,           Print,    exec, grim -g "$(slurp)" - | wl-copy

# ── Apple — function key remap (pre-T2 + T2) ─────────────────────────────────
# Apple keyboards send Fx keys by default — swap fn behaviour via keyd or
# /etc/modprobe.d/hid_apple.conf:
#   options hid_apple fnmode=2
# This makes F1-F12 primary, media keys require Fn held.
# The installer handles this — no Hyprland bind needed here.

# ── Apple — media keys (recognised after hid_apple fnmode fix) ───────────────
binde = , xf86AudioRaiseVolume,  exec, pamixer -i 5
binde = , xf86AudioLowerVolume,  exec, pamixer -d 5
bindl  = , xf86AudioMute,        exec, pamixer -t
bindl  = , xf86AudioPlay,        exec, playerctl play-pause
bindl  = , xf86AudioNext,        exec, playerctl next
bindl  = , xf86AudioPrev,        exec, playerctl previous

# ── ThinkPad — extra keys ────────────────────────────────────────────────────
bind = , xf86Launch1,      exec, $scripts/touchpad-toggle.sh  # ThinkPad touchpad toggle button
bind = , xf86ScreenSaver,  exec, hyprlock                     # ThinkPad lock button

# ── Touchpad device config ────────────────────────────────────────────────────
# Hyprland will apply this to any device matching the name pattern.
# User should override $Touchpad_Device in user/laptops.conf with their device.
# Run: hyprctl devices   — to find the exact name.
$Touchpad_Device = auto

device {
    name    = $Touchpad_Device
    enabled = true
    natural_scroll = true
    tap-to-click   = true
}
