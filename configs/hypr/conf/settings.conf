# ════════════════════════════════════════════════════════════
# NECRODERMIS
# Hyprland Settings  //  conf/settings.conf
# System defaults — override in user/settings.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# LAYOUTS
#   dwindle  = binary space partitioning. New windows split the current
#              window in half. Most common tiling layout.
#   master   = one main window on the left, stack of windows on the right.
#
# DWINDLE OPTIONS
#   pseudotile        = windows tile but respect their minimum size hints.
#                       Toggled per-window with SUPER+P.
#   preserve_split    = keeps split direction when windows are closed/moved.
#   special_scale_factor = how much of the screen the special workspace takes.
#                          0.8 = 80% of screen.
#
# MASTER OPTIONS
#   new_status  = master puts new windows in the master slot.
#                 stack puts them in the stack.
#   mfact       = master area width as a fraction. 0.5 = 50/50 split.
#
# GENERAL
#   resize_on_border = drag window borders to resize (no keybind needed).
#   layout           = default layout: dwindle or master.
#   gaps_in          = gap between windows (pixels).
#   gaps_out         = gap between windows and monitor edge (pixels).
#   border_size      = window border thickness (pixels).
#
# INPUT
#   sensitivity      = mouse sensitivity. 0 = libinput default. -1.0 to 1.0.
#   repeat_rate      = key repeat speed (chars/sec). Higher = faster.
#   repeat_delay     = ms before key starts repeating. Lower = faster start.
#   follow_mouse     = 1 = focus follows mouse. 0 = click to focus.
#   numlock_by_default = self explanatory.
#
# MISC
#   vfr              = variable frame rate. Saves power when idle. Keep true.
#   vrr              = variable refresh rate (FreeSync/GSync).
#                      0 = off, 1 = always on, 2 = fullscreen only.
#   enable_swallow   = terminal swallows child GUI apps (e.g. open mpv from
#                      kitty — kitty disappears, mpv takes its place).
#   swallow_regex    = which terminal class to swallow from.
#   middle_click_paste = X11-style middle click paste. Disable to avoid accidents.
#   anr_missed_pings = how many missed pings before "App Not Responding" dialog.
#                      Default of 1 is too aggressive — 15 is sane.
#   on_focus_under_fullscreen:
#     0 = default, 1 = new window takes fullscreen (Windows-style), 2 = stays behind.
#
# BINDS
#   workspace_back_and_forth = SUPER+1 twice goes back to previous workspace.
#   allow_workspace_cycles   = wraps around when scrolling past last workspace.
#
# XWAYLAND
#   force_zero_scaling = fixes blurry XWayland apps when using monitor scaling.
#
# CURSOR
#   no_hardware_cursors     = software cursor rendering. More compatible.
#   enable_hyprcursor       = use hyprcursor format themes if available.
#   warp_on_change_workspace = cursor jumps to focused window on ws switch.
#                              2 = only warp if cursor is not on a window.
#
# ════════════════════════════════════════════════════════════

dwindle {
    pseudotile           = true
    preserve_split       = true
    special_scale_factor = 0.8
}

master {
    new_status = master
    new_on_top = true
    mfact      = 0.5
}

general {
    resize_on_border = true
    layout           = dwindle
    gaps_in          = 5
    gaps_out         = 10
    border_size      = 3
}

input {
    kb_layout  = us
    repeat_rate  = 50
    repeat_delay = 300
    sensitivity  = 0
    numlock_by_default          = true
    follow_mouse                = 1
    float_switch_override_focus = false

    touchpad {
        disable_while_typing    = true
        natural_scroll          = true
        tap-to-click            = true
        drag_lock               = false
        middle_button_emulation = false
    }
}

gestures {
}

misc {
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    vfr                        = true
    vrr                        = 2
    mouse_move_enables_dpms    = true
    enable_swallow             = true
    swallow_regex              = ^(kitty)$
    focus_on_activate          = false
    initial_workspace_tracking = 0
    middle_click_paste         = false
    enable_anr_dialog          = true
    anr_missed_pings           = 15
    allow_session_lock_restore = true
    on_focus_under_fullscreen  = 1
}

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
    pass_mouse_when_bound    = false
}

xwayland {
    enabled            = true
    force_zero_scaling = true
}

render {
    direct_scanout = false  # set true for potential latency gains in fullscreen games
}

cursor {
    sync_gsettings_theme     = true
    no_hardware_cursors      = true
    enable_hyprcursor        = true
    warp_on_change_workspace = 2
    no_warps                 = true
}
