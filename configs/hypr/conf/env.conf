# ════════════════════════════════════════════════════════════
# NECRODERMIS
# Hyprland Environment Variables  //  conf/env.conf
# System defaults — override in user/env.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# FORMAT:  env = VARIABLE, VALUE
#
# These are set before Hyprland launches any apps, so everything
# spawned from Hyprland or its startup sequence inherits them.
#
# WHEN TO TOUCH THIS FILE:
#   - App rendering on wrong backend (X11 vs Wayland)
#   - Qt apps look wrong or don't respect your theme
#   - Cursor theme not applying in all apps
#   - Firefox not running natively on Wayland
#   - Electron apps (Discord, VSCode, etc.) opening as X11
#   - HiDPI scaling issues (blurry text, wrong sizes)
#
# TOOLKIT BACKENDS
#   GDK_BACKEND      = GTK app backend order. wayland,x11,* tries Wayland
#                      first, falls back to X11, then anything else.
#   QT_QPA_PLATFORM  = Qt app backend. wayland;xcb = Wayland with X11 fallback.
#   CLUTTER_BACKEND  = Clutter (GNOME animations library) backend.
#   SDL_VIDEODRIVER  = SDL2 games backend. Uncomment if SDL2 games work on Wayland.
#                      Leave commented if older games break.
#
# XDG
#   These tell apps which desktop they're running under.
#   Required for xdg-desktop-portal-hyprland to work correctly.
#   Don't change these.
#
# QT
#   QT_AUTO_SCREEN_SCALE_FACTOR       = lets Qt auto-scale to monitor DPI.
#   QT_WAYLAND_DISABLE_WINDOWDECORATION = disables Qt's own window borders
#                                         (Hyprland draws them instead).
#   QT_QPA_PLATFORMTHEME              = which Qt theme engine to use.
#                                       qt6ct = configured via qt6ct app.
#   QT_QUICK_CONTROLS_STYLE           = Hyprland's native Qt style for
#                                       system components (polkit, etc.)
#
# SCALING
#   GDK_SCALE / QT_SCALE_FACTOR = explicit scale factor for GTK and Qt apps.
#   Set to match your monitor scale in monitors.conf.
#   1 = 100%, 1.5 = 150%, 2 = 200% (HiDPI/Retina).
#
# CURSOR
#   HYPRCURSOR_THEME = cursor theme name (must be installed).
#   HYPRCURSOR_SIZE  = cursor size in pixels.
#   Run: hyprctl setcursor THEME SIZE   to preview without restarting.
#
# FIREFOX
#   MOZ_ENABLE_WAYLAND = 1 forces Firefox to run natively on Wayland.
#   Without this it runs via XWayland — works but is slightly blurrier.
#
# ELECTRON
#   ELECTRON_OZONE_PLATFORM_HINT = auto picks Wayland if supported,
#   X11 otherwise. Affects Discord, VSCode, Obsidian, etc.
#
# NVIDIA (uncomment if applicable)
#   Only needed on NVIDIA GPUs. AMD and Intel don't need any of these.
#   Enable one at a time and test — some combos cause crashes.
#
# ════════════════════════════════════════════════════════════

# ── Toolkit backends ──────────────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
# env = SDL_VIDEODRIVER,wayland   # uncomment if SDL2 games behave on Wayland

# ── XDG ───────────────────────────────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

# ── QT ────────────────────────────────────────────────────────────────────────
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style

# ── Scaling — match your monitor scale from monitors.conf ─────────────────────
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1

# ── Cursor ────────────────────────────────────────────────────────────────────
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,24

# ── Firefox ───────────────────────────────────────────────────────────────────
env = MOZ_ENABLE_WAYLAND,1

# ── Electron (Discord, VSCode, Obsidian, etc.) ────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── Steam ─────────────────────────────────────────────────────────────────────
# Forces Steam UI to scale correctly on HiDPI monitors.
# Safe to leave on at 1080p — has no effect if you're not scaling.
env = STEAM_FORCE_DESKTOPUI_SCALING,1

# ── NVIDIA (uncomment if applicable — AMD/Intel users ignore this) ────────────
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
# env = GBM_BACKEND,nvidia-drm
# env = GSK_RENDERER,ngl
