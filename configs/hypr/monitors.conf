# ════════════════════════════════════════════════════════════
# NECRODERMIS — SAUTEKH DYNASTY
# Monitor Configuration  //  monitors.conf
# ════════════════════════════════════════════════════════════
#
# GLOSSARY
# ────────────────────────────────────────────────────────────
# monitor = NAME, RESOLUTION@REFRESHRATE, POSITION, SCALE
#
#   NAME         Your monitor's connector name.
#                Run: hyprctl monitors   — to see all connected monitors.
#                Run: ls /sys/class/drm/ — to see connector names.
#                Examples: DP-1, HDMI-A-1, eDP-1 (built-in laptop display)
#                Use: ,    (empty) to match ANY monitor not explicitly listed.
#
#   RESOLUTION   Width x Height. Example: 2560x1440
#                Use: preferred   — to let the monitor pick its native res.
#                Use: highres     — highest available resolution.
#
#   REFRESHRATE  After the @. Example: 144 or 60
#                Use: highrr      — highest available refresh rate.
#
#   POSITION     Where this monitor sits in the global canvas, in pixels.
#                Top-left is 0x0. Monitors are placed left-to-right by
#                increasing the X value by the previous monitor's width.
#                Example: three monitors at 2560 wide — 0x0, 2560x0, 5120x0
#
#   SCALE        DPI scaling factor. 1 = 100%, 1.5 = 150%, 2 = 200%.
#                Use 1 for 1080p, 1.5 or 2 for HiDPI/Retina displays.
#
#   TRANSFORM    Rotation. Add after scale if needed.
#                0 = normal, 1 = 90°, 2 = 180°, 3 = 270°
#                Example: monitor = DP-2, 1080x1920@60, 0x0, 1, transform, 1
#
# ────────────────────────────────────────────────────────────
# EXAMPLES
# ────────────────────────────────────────────────────────────
#
#   Single monitor (auto):
#     monitor = , preferred, auto, 1
#
#   Two monitors side by side:
#     monitor = DP-1,   2560x1440@144, 0x0,    1
#     monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
#
#   Vertical monitor (rotated 90°):
#     monitor = DP-2, 1080x1920@60, 0x0, 1, transform, 1
#
#   Laptop with external monitor (laptop display on right):
#     monitor = eDP-1,   1920x1080@60, 2560x0, 1
#     monitor = HDMI-A-1, 2560x1440@60, 0x0,   1
#
#   Laptop lid closed (disable internal display):
#     monitor = eDP-1, disable
#
#   HiDPI / Retina (MacBook, etc.):
#     monitor = eDP-1, 2560x1600@60, 0x0, 2
#
# ════════════════════════════════════════════════════════════
# YOUR CONFIGURATION — edit below this line
# ════════════════════════════════════════════════════════════

# Fallback — any monitor not listed below gets a sane default
monitor = , preferred, auto, 1

