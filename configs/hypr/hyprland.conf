# NECRODERMIS
# Hyprland configuration
# https://github.com/thedogfatheractual/Necrodermis

# ── Path variables ────────────────────────────────────────────────────────────
$conf     = $HOME/.config/hypr/conf    # Necrodermis system defaults
$user     = $HOME/.config/hypr/user    # User overrides — edit freely
$scripts  = $HOME/.config/hypr/scripts

# ── Core — system defaults ────────────────────────────────────────────────────
source = $conf/env.conf
source = $conf/settings.conf
source = $conf/decorations.conf
source = $conf/animations.conf
source = $conf/keybinds.conf
source = $conf/windowrules.conf
source = $conf/startup.conf
source = $conf/laptops.conf

# ── User overrides — loaded after defaults so they win ───────────────────────
source = $user/env.conf
source = $user/settings.conf
source = $user/decorations.conf
source = $user/animations.conf
source = $user/keybinds.conf
source = $user/windowrules.conf
source = $user/startup.conf
source = $user/laptops.conf
source = $user/laptop-display.conf
source = $user/workspacerules.conf
source = $user/defaults.conf

# ── Hardware ──────────────────────────────────────────────────────────────────
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/workspaces.conf
