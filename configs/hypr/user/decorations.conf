# ---- NECRODERMIS — TOMBWORLD DECORATION PROTOCOL ----
# Static Necrodermis palette
# Borders handled dynamically by RainbowBorders.sh

$nd_green       = rgb(00ff00)
$nd_green_mid   = rgb(00cc00)
$nd_green_deep  = rgb(006600)
$nd_void        = rgb(001400)
$nd_tomb        = rgb(020802)

general {
  border_size = 2
  gaps_in = 2
  gaps_out = 4
  col.active_border = $nd_green $nd_green_deep 270deg
  col.inactive_border = $nd_void
}

decoration {
  rounding = 4

  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.15
  dim_special = 0.8

  shadow {
    enabled = true
    range = 6
    render_power = 2
    color = rgba(00ff0033)
    color_inactive = rgba(00000099)
  }

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $nd_green
  groupbar {
    col.active = $nd_void
  }
}
